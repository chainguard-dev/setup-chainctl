name: "Setup chainctl"
description: |
  This action sets up the Chainguard chainctl CLI and authenticates
  it against the target environment.

branding:
  icon: "terminal"
  color: "purple"

inputs:
  environment:
    description: |
      Determines the environment from which to download the chainctl
      binary from.
    required: true
    default: enforce.dev

  env-auth:
    description: |
      Determines if we export HTTP_AUTH env variable with chainctl auth
      token.
    required: false
    default: "false"

  identity:
    description: |
      The id of the identity that this workflow should assume for
      performing actions with chainctl.
    required: false

  audience:
    description: |
      Specifies the identity token audience to use when creating an
      identity token to authenticate with Chainguard.
      Defaults to issuer.${environment}

      This field is DEPRECATED, use identity instead.
    required: false

  invite-code:
    description: |
      Optionally specifies an invite code that allows this workflow
      register itself when run for the first time.

      Use of invite codes is DEPRECATED, use identity instead.
    required: false

  verbosity:
    description: |
      Set the logging verbosity for chainctl. A value of 0 disables
      logging output. Valid values are 1-5, increasing in verbosity.
    required: false
    default: "0"

  config-path:
    description: |
      The location of the chainctl config file to use. These values
      override the default configuration values in the binary.
    required: false
    default: ""

  retry-all-errors:
    description: |
      Whether to retry on errors downloading the chainctl binary.
    required: false
    default: "true"

  apk-host:
    description: |
      The hostname to authenticate against for APK-related authentication.
    required: false
    default: apk.cgr.dev

  libraries-host:
    description: |
      The hostname to authenticate against for Chainguard Libraries-related
      authentication.
    required: false
    default: libraries.cgr.dev

  setup-python-keyring:
    description: |
      Whether to install the Chainguard Libraries pip keyring package.
    required: false
    default: "false"

runs:
  using: "composite"

  steps:
    - name: Install chainctl
      shell: bash
      env:
        CURL_RETRY_ALL_ERRORS: ${{ inputs.retry-all-errors }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        cd "$(mktemp -d)" || exit

        # Massage GitHub's values to the ones we expect.
        # https://docs.github.com/en/actions/learn-github-actions/contexts#runner-context
        # RUNNER_OS and RUNNER_ARCH are set automatically by the GitHub Actions runner.
        os=$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')
        if [[ "${os}" == "macos" ]]; then
          os="darwin"
        fi

        arch="$RUNNER_ARCH"
        if [[ "${arch}" == "X64" ]]; then
          arch="x86_64"
        elif [[ "${arch}" == "ARM64" ]]; then
          arch="arm64"
        fi

        url="https://dl.${ENVIRONMENT}/chainctl/latest/chainctl_${os}_${arch}"
        out="chainctl"
        if [[ "${os}" == "windows" ]]; then
          url="${url}.exe"
          out="${out}.exe"
        fi
        echo "Downloading chainctl from ${url}"

        if [[ "$CURL_RETRY_ALL_ERRORS" != "true" ]]; then
          curl -o ./${out} -fsL --retry 5 --retry-delay 1 "${url}"
        else
          curl -o ./${out} -fsL --retry 5 --retry-delay 1 --retry-all-errors "${url}"
        fi

        # Verify chainctl binary checksum
        checksums_url="https://dl.${ENVIRONMENT}/chainctl/latest/chainctl_checksums.txt"
        echo "Downloading checksums from ${checksums_url}"
        curl -o checksums.txt -fsL --retry 3 --retry-delay 1 "${checksums_url}"
        expected=$(grep "chainctl_${os}_${arch}" checksums.txt | awk '{print $1}')
        if [[ -z "${expected}" ]]; then
          echo "::error::No checksum found for chainctl_${os}_${arch} in checksums.txt"
          exit 1
        fi
        if command -v sha256sum &>/dev/null; then
          actual=$(sha256sum "./${out}" | awk '{print $1}')
        elif command -v shasum &>/dev/null; then
          actual=$(shasum -a 256 "./${out}" | awk '{print $1}')
        elif command -v powershell &>/dev/null; then
          actual=$(powershell -Command "(Get-FileHash -Algorithm SHA256 './${out}').Hash.ToLower()")
        else
          echo "::error::No sha256 tool available (tried sha256sum, shasum, PowerShell Get-FileHash)"
          exit 1
        fi
        if [[ "${expected}" != "${actual}" ]]; then
          echo "::error::Checksum mismatch for chainctl: expected ${expected}, got ${actual}"
          exit 1
        fi
        echo "Checksum verified for chainctl_${os}_${arch}"

        chmod +x ./${out}
        echo "$(pwd)" >> "$GITHUB_PATH"

        # Print the version of chainctl installed
        ./${out} version

    - name: Authenticate with Chainguard (assumed identity)
      shell: bash
      if: ${{ inputs.identity != '' }}
      env:
        CHAINCTL_DEBUG: "true"
        VERBOSITY: ${{ inputs.verbosity }}
        IDENTITY: ${{ inputs.identity }}
        CHAINCTL_CONFIG: ${{ inputs.config-path }}
        EXPORT_AUTH: ${{ inputs.env-auth }}
        LIBRARIES_HOST: ${{ inputs.libraries-host }}
        APK_HOST: ${{ inputs.apk-host }}
      run: |
        echo "::group::Authenticating with Chainguard as $IDENTITY"
        if chainctl auth login --identity "$IDENTITY" -v="$VERBOSITY"; then
          echo Logged in as "$IDENTITY"!
        else
          echo "::error Unable to assume the identity $IDENTITY."
          exit 1
        fi
        echo "::endgroup::"

        echo "::group::Authenticating with $LIBRARIES_HOST as $IDENTITY"
        if ! chainctl auth login --identity "$IDENTITY" --audience "$LIBRARIES_HOST" -v="$VERBOSITY"; then
          echo "::error Unable to assume the identity $IDENTITY for $LIBRARIES_HOST."
          exit 1
        fi
        echo "::endgroup::"

        echo "::group::Authenticating with $APK_HOST as $IDENTITY"
        if ! chainctl auth login --identity "$IDENTITY" --audience "$APK_HOST" -v="$VERBOSITY"; then
          echo "::error Unable to assume the identity $IDENTITY for $APK_HOST."
          exit 1
        fi
        echo "::endgroup::"

        echo "::group::Registering docker credential helper"
        if ! chainctl auth configure-docker --identity "$IDENTITY" -v="$VERBOSITY"; then
          echo "::error Unable to register credential helper as $IDENTITY."
          exit 1
        fi
        echo "::endgroup::"

        if [ "$EXPORT_AUTH" == "true" ]; then
          echo "::group::Exporting HTTP_AUTH environment variable for $APK_HOST"
          echo HTTP_AUTH="basic:${APK_HOST}:user:$(chainctl auth token --audience "$APK_HOST")" >> "$GITHUB_ENV"
          echo "::endgroup::"
        fi

    - name: Authenticate with Chainguard (DEPRECATED invite-code)
      shell: bash
      if: ${{ inputs.invite-code != '' }}
      env:
        CHAINGUARD_INVITE_CODE: ${{ inputs.invite-code }}
        CHAINCTL_DEBUG: "true"
        VERBOSITY: ${{ inputs.verbosity }}
        ENVIRONMENT: ${{ inputs.environment }}
        AUDIENCE: ${{ inputs.audience }}
        EXPORT_AUTH: ${{ inputs.env-auth }}
        APK_HOST: ${{ inputs.apk-host }}
      run: |
        echo "::warning::The use of invite codes with Github actions is deprecated, use assumed identities instead."

        AUDIENCE_VAL="$AUDIENCE"
        if [[ -z "${AUDIENCE_VAL}" ]]; then
          AUDIENCE_VAL="issuer.${ENVIRONMENT}"
        fi
        IDTOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${AUDIENCE_VAL}" | jq -r '.value')

        # This will start failing once the invite code expires, which is why we have the login guard.
        if chainctl auth login --create-group=false --identity-token "${IDTOKEN}" --invite-code="${CHAINGUARD_INVITE_CODE}" -v="$VERBOSITY"; then
          echo Logged in!
        else
          echo Failed to log in with invite code
          exit 1
        fi
        if [ "$EXPORT_AUTH" == "true" ]; then
          echo HTTP_AUTH="basic:${APK_HOST}:user:$(chainctl auth token --audience "$APK_HOST")" >> "$GITHUB_ENV"
        fi

    - if: ${{ inputs.setup-python-keyring == 'true' }}
      name: Install Python keyring package
      shell: bash
      run: |
        python -m pip install "keyrings-chainguard-libraries==0.2.0"